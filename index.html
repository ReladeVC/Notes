<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VC Notes — защищённый блокнот</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --bg-elevated: #222222;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-medium: rgba(255, 255, 255, 0.1);
            --text-primary: #fafafa;
            --text-secondary: #a1a1a1;
            --text-tertiary: #737373;
            --accent: #0a84ff;
            --accent-hover: #0070e0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.6);
            --gradient-primary: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            --gradient-accent: linear-gradient(135deg, #0a84ff 0%, #0055d4 100%);
            --gradient-danger: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        body {
            background: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            position: relative;
        }

        .app::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(10, 132, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(10, 132, 255, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* Верхняя панель */
        .navbar {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border-subtle);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 100;
            box-shadow: var(--shadow-md);
        }

        .logo {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1a1 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 11px;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .auth {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 16px;
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            flex-wrap: wrap;
            transition: all 0.3s ease;
        }

        .auth:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-medium);
        }

        .auth input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 13px;
            color: var(--text-primary);
            width: 160px;
            transition: all 0.2s ease;
        }

        .auth input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.1);
        }

        .auth input::placeholder {
            color: var(--text-tertiary);
        }

        .auth button, .small-btn {
            background: var(--gradient-accent);
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .auth button::before, .small-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .auth button:hover::before, .small-btn:hover::before {
            left: 100%;
        }

        .auth button:hover, .small-btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .auth button:active, .small-btn:active {
            transform: translateY(0);
        }

        .auth button.outline, .small-btn.outline {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-medium);
        }

        .auth button.outline:hover, .small-btn.outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--text-secondary);
        }

        .badge {
            background: rgba(10, 132, 255, 0.1);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            color: var(--accent);
            border: 1px solid rgba(10, 132, 255, 0.2);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        /* Основная область */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        /* Список заметок */
        .sidebar {
            width: 320px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
        }

        .notes-header h3 {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .new-btn {
            background: var(--gradient-accent);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            color: white;
            font-weight: 300;
        }

        .new-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }

        .new-btn:active {
            transform: scale(0.98);
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }

        .notes-list::-webkit-scrollbar {
            width: 6px;
        }

        .notes-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .notes-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .notes-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .note-item {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid var(--border-subtle);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .note-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-accent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .note-item:hover {
            background: var(--bg-elevated);
            border-color: var(--border-medium);
            transform: translateX(2px);
        }

        .note-item:hover::before {
            opacity: 1;
        }

        .note-item.active {
            background: var(--bg-elevated);
            border-left: 3px solid var(--accent);
            box-shadow: var(--shadow-md);
        }

        .note-item.active::before {
            opacity: 1;
        }

        .note-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.4;
        }

        .note-date {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        /* Редактор */
        .editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            overflow: hidden;
            position: relative;
        }

        .editor-toolbar {
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(20, 20, 20, 0.5);
            backdrop-filter: blur(10px);
        }

        .title-input {
            font-size: 28px;
            font-weight: 700;
            background: transparent;
            border: none;
            color: var(--text-primary);
            flex: 1;
            outline: none;
            letter-spacing: -0.5px;
        }

        .title-input::placeholder {
            color: var(--text-tertiary);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-medium);
            padding: 10px 20px;
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .icon-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .icon-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--text-secondary);
            transform: translateY(-1px);
        }

        .icon-btn:active {
            transform: translateY(0);
        }

        .icon-btn.emoji {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.3);
            color: var(--warning);
        }

        .icon-btn.emoji:hover {
            background: rgba(245, 158, 11, 0.15);
        }

        .icon-btn.danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        .icon-btn.danger:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        .content-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        textarea, .viewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 32px 40px;
            font-size: 16px;
            line-height: 1.7;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            overflow-y: auto;
            font-family: inherit;
        }

        textarea::placeholder {
            color: var(--text-tertiary);
        }

        textarea::-webkit-scrollbar, .viewer::-webkit-scrollbar {
            width: 8px;
        }

        textarea::-webkit-scrollbar-track, .viewer::-webkit-scrollbar-track {
            background: transparent;
        }

        textarea::-webkit-scrollbar-thumb, .viewer::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        textarea::-webkit-scrollbar-thumb:hover, .viewer::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .viewer {
            background: var(--bg-secondary);
        }

        .viewer a {
            color: var(--accent) !important;
            text-decoration: underline;
            transition: color 0.2s ease;
        }

        .viewer a:hover {
            color: var(--accent-hover) !important;
        }

        .viewer h1, .viewer h2, .viewer h3 {
            margin-top: 24px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .viewer h1 { font-size: 28px; }
        .viewer h2 { font-size: 24px; }
        .viewer h3 { font-size: 20px; }

        .viewer ul, .viewer ol {
            margin: 12px 0;
            padding-left: 32px;
        }

        .viewer li {
            margin: 8px 0;
        }

        .bottom-status {
            padding: 12px 32px;
            font-size: 12px;
            color: var(--text-tertiary);
            border-top: 1px solid var(--border-subtle);
            background: rgba(20, 20, 20, 0.5);
            font-weight: 500;
        }

        /* Эмодзи-пикер */
        .emoji-picker {
            position: absolute;
            background: var(--bg-elevated);
            border-radius: 16px;
            padding: 16px;
            display: none;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            max-width: 380px;
            z-index: 1000;
            border: 1px solid var(--border-medium);
            box-shadow: var(--shadow-xl);
            backdrop-filter: blur(20px);
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .emoji-picker.show {
            display: grid;
        }

        .emoji-item {
            font-size: 28px;
            cursor: pointer;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            transition: all 0.15s ease;
        }

        .emoji-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .emoji-item:active {
            transform: scale(0.95);
        }

        /* Loading states */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Message animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #msgArea {
            animation: fadeIn 0.3s ease;
        }

        @media (max-width: 750px) {
            .sidebar { 
                width: 280px; 
            }
            .auth input { 
                width: 120px; 
            }
            .navbar {
                padding: 12px 20px;
            }
            .editor-toolbar {
                padding: 16px 20px;
            }
            textarea, .viewer {
                padding: 20px 24px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="navbar">
        <div class="logo">
            <h1>📓 VC Notes</h1>
            <p>🔒 AES-GCM 256</p>
        </div>
        <div class="auth">
            <input type="text" id="userId" placeholder="Ваш ID">
            <input type="password" id="password" placeholder="Пароль">
            <button id="loginBtn">Разблокировать</button>
            <button id="logoutBtn" class="outline">Выйти</button>
            <button id="exportBtn" class="small-btn outline">🔒 Экспорт</button>
            <button id="importBtn" class="small-btn outline">📥 Импорт</button>
        </div>
        <div class="badge" id="authBadge">🔒 Не авторизован</div>
    </div>
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <div id="msgArea" style="font-size:12px; text-align:center; min-height:32px; padding: 8px 0;"></div>
                <div class="notes-header">
                    <h3>Все заметки</h3>
                    <div id="newNoteBtn" class="new-btn">+</div>
                </div>
            </div>
            <div class="notes-list" id="notesList">🔐 Авторизуйтесь</div>
        </div>
        <div class="editor">
            <div class="editor-toolbar">
                <input type="text" id="noteTitle" class="title-input" placeholder="Название заметки">
                <div class="action-buttons">
                    <button id="emojiBtn" class="icon-btn emoji">😊 Эмодзи</button>
                    <button id="saveBtn" class="icon-btn">💾 Сохранить</button>
                    <button id="deleteBtn" class="icon-btn danger">🗑 Удалить</button>
                </div>
            </div>
            <div class="content-container">
                <textarea id="noteBody" placeholder="Напишите что-нибудь... (Markdown, ссылки)"></textarea>
                <div id="viewer" class="viewer"></div>
            </div>
            <div class="bottom-status" id="statusMsg">● Ничего не выбрано</div>
        </div>
    </div>
    <div id="emojiPicker" class="emoji-picker"></div>
</div>

<script>
    // ----- Утилиты -----
    const msgDiv = document.getElementById('msgArea');
    const statusSpan = document.getElementById('statusMsg');
    let msgTimeout = null;
    function showMsg(text, isError = false, duration = 10000) {
        if (msgTimeout) clearTimeout(msgTimeout);
        msgDiv.textContent = text;
        msgDiv.style.color = isError ? '#ef4444' : '#0a84ff';
        msgDiv.style.animation = 'none';
        setTimeout(() => msgDiv.style.animation = 'fadeIn 0.3s ease', 10);
        msgTimeout = setTimeout(() => {
            msgDiv.style.opacity = '0';
            setTimeout(() => { msgDiv.textContent = ''; msgDiv.style.opacity = '1'; }, 500);
        }, duration);
    }
    function showStatus(text, duration = 3000) {
        if (msgTimeout) clearTimeout(msgTimeout);
        statusSpan.textContent = text;
        msgTimeout = setTimeout(() => {
            statusSpan.style.opacity = '0';
            setTimeout(() => { statusSpan.textContent = '● Ничего не выбрано'; statusSpan.style.opacity = '1'; }, 500);
        }, duration);
    }

    // ----- Криптография -----
    async function deriveKey(pwd, salt) {
        const enc = new TextEncoder();
        const keyMat = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 210000, hash: 'SHA-256' }, keyMat,
            { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
    }
    async function encryptData(obj, pwd) {
        const plain = JSON.stringify(obj);
        const enc = new TextEncoder();
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(pwd, salt);
        const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plain));
        const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        combined.set(salt); combined.set(iv, salt.length); combined.set(new Uint8Array(encrypted), salt.length + iv.length);
        return btoa(String.fromCharCode(...combined));
    }
    async function decryptData(base64, pwd) {
        const data = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        const salt = data.slice(0,16), iv = data.slice(16,28), cipher = data.slice(28);
        const key = await deriveKey(pwd, salt);
        const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cipher);
        return JSON.parse(new TextDecoder().decode(dec));
    }

    // ----- Хранилище -----
    const STORAGE_PREFIX = 'vc_notes_v4';
    function getKey(uid) { return `${STORAGE_PREFIX}_${uid}`; }
    async function saveCollection(uid, pwd, data) {
        const enc = await encryptData(data, pwd);
        localStorage.setItem(getKey(uid), enc);
    }
    async function loadCollection(uid, pwd) {
        const raw = localStorage.getItem(getKey(uid));
        if (!raw) return { notes: {}, nextId: 1 };
        return await decryptData(raw, pwd);
    }

    // ----- Глобальное состояние -----
    let currentUser = null, currentPass = null;
    let notes = { notes: {}, nextId: 1 };
    let currentId = null;
    let isViewMode = false;

    // DOM элементы
    const userIdInp = document.getElementById('userId');
    const passInp = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const authBadge = document.getElementById('authBadge');
    const notesListDiv = document.getElementById('notesList');
    const newNoteBtn = document.getElementById('newNoteBtn');
    const titleInp = document.getElementById('noteTitle');
    const bodyTextarea = document.getElementById('noteBody');
    const viewerDiv = document.getElementById('viewer');
    const saveBtn = document.getElementById('saveBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPicker = document.getElementById('emojiPicker');

    // ----- Markdown -> HTML -----
    function mdToHtml(text) {
        if (!text) return '';
        let html = text;
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
        html = html.replace(/__(.*?)__/g, '<u>$1</u>');
        html = html.replace(/^- (.*$)/gm, '<li>$1</li>');
        html = html.replace(/^\d+\. (.*$)/gm, '<li style="list-style-type:decimal;">$1</li>');
        html = html.replace(/(<li.*<\/li>)+/g, '<ul>$&</ul>');
        const urlRegex = /(\b(https?|ftp):\/\/[^\s<>]+|www\.[^\s<>]+\.[^\s<>]+)/gi;
        html = html.replace(urlRegex, url => {
            let href = url.startsWith('www.') ? 'https://'+url : url;
            return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
        });
        html = html.replace(/\n/g, '<br>');
        return html;
    }

    function updateViewer() {
        if (currentId && notes.notes[currentId]) {
            viewerDiv.innerHTML = mdToHtml(notes.notes[currentId].body || '');
        } else {
            viewerDiv.innerHTML = '<div style="color:#737373; text-align:center; padding:40px;">Выберите заметку</div>';
        }
    }

    function toggleMode() {
        isViewMode = !isViewMode;
        const modeBtn = document.getElementById('modeToggle');
        if (isViewMode) {
            bodyTextarea.style.display = 'none';
            viewerDiv.style.display = 'block';
            updateViewer();
            modeBtn.textContent = '👁️ Режим просмотра';
        } else {
            bodyTextarea.style.display = 'block';
            viewerDiv.style.display = 'none';
            modeBtn.textContent = '✏️ Режим редактирования';
        }
    }

    const modeBtn = document.createElement('button');
    modeBtn.className = 'icon-btn';
    modeBtn.id = 'modeToggle';
    modeBtn.textContent = '✏️ Режим редактирования';
    document.querySelector('.editor-toolbar .action-buttons').prepend(modeBtn);
    modeBtn.onclick = toggleMode;

    // ----- Рендер списка -----
    function renderList() {
        if (!currentUser) {
            notesListDiv.innerHTML = '<div style="padding:32px; text-align:center; color:#737373;">🔐 Авторизуйтесь</div>';
            return;
        }
        const items = Object.entries(notes.notes).sort((a,b) => (b[1].updatedAt||0) - (a[1].updatedAt||0));
        if (items.length === 0) {
            notesListDiv.innerHTML = '<div style="padding:32px; text-align:center; color:#737373;">📭 Нет заметок. Нажмите +</div>';
            return;
        }
        notesListDiv.innerHTML = items.map(([id, note]) => `
            <div class="note-item ${currentId == id ? 'active' : ''}" data-id="${id}">
                <div class="note-title">${escapeHtml(note.title || 'Без названия').substring(0,40)}</div>
                <div class="note-date">${note.updatedAt ? new Date(note.updatedAt).toLocaleString() : 'недавно'}</div>
            </div>
        `).join('');
        document.querySelectorAll('.note-item').forEach(el => {
            el.addEventListener('click', () => {
                currentId = el.dataset.id;
                loadNoteToEditor(currentId);
                renderList();
            });
        });
    }

    function loadNoteToEditor(id) {
        const note = notes.notes[id];
        if (!note) return;
        titleInp.value = note.title || '';
        bodyTextarea.value = note.body || '';
        if (isViewMode) updateViewer();
    }

    async function saveCurrent() {
        if (!currentUser) { showMsg('Авторизуйтесь', true); return; }
        const title = titleInp.value.trim();
        const body = bodyTextarea.value;
        if (!title && !body) { showStatus('⚠️ Пустая заметка', 3000); return; }
        let id = currentId;
        if (!id || !notes.notes[id]) {
            id = String(notes.nextId++);
            notes.notes[id] = { title: title || 'Новая заметка', body, createdAt: Date.now(), updatedAt: Date.now() };
        } else {
            notes.notes[id].title = title || 'Без названия';
            notes.notes[id].body = body;
            notes.notes[id].updatedAt = Date.now();
        }
        currentId = id;
        await saveCollection(currentUser, currentPass, { notes: notes.notes, nextId: notes.nextId });
        showStatus('✅ Сохранено', 2000);
        renderList();
        if (isViewMode) updateViewer();
    }

    async function deleteCurrent() {
        if (!currentId || !notes.notes[currentId]) return;
        if (!confirm('Удалить заметку?')) return;
        delete notes.notes[currentId];
        const ids = Object.keys(notes.notes);
        currentId = ids.length ? ids[0] : null;
        await saveCollection(currentUser, currentPass, { notes: notes.notes, nextId: notes.nextId });
        if (currentId) loadNoteToEditor(currentId);
        else { titleInp.value = ''; bodyTextarea.value = ''; viewerDiv.innerHTML = ''; }
        renderList();
        showStatus('🗑 Удалено', 2000);
    }

    async function newNote() {
        if (!currentUser) { showMsg('Авторизуйтесь', true); return; }
        currentId = null;
        titleInp.value = '';
        bodyTextarea.value = '';
        if (isViewMode) viewerDiv.innerHTML = '<div style="color:#737373; text-align:center; padding:40px;">Новая заметка</div>';
        showStatus('✏️ Новая заметка', 2000);
    }

    // ----- Эмодзи -----
    const emojis = ['😀','😃','😄','😁','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','❤️','🧡','💛','💚','💙','💜','🖤','🤍','👍','👎','👌','✌️','🤞','🤟','🤘','👏'];
    emojiPicker.innerHTML = emojis.map(e => `<div class="emoji-item">${e}</div>`).join('');
    function showPicker(e) {
        const rect = emojiBtn.getBoundingClientRect();
        emojiPicker.style.top = rect.bottom + 8 + 'px';
        emojiPicker.style.left = rect.left + 'px';
        emojiPicker.classList.toggle('show');
    }
    function insertEmoji(emoji) {
        const start = bodyTextarea.selectionStart, end = bodyTextarea.selectionEnd;
        bodyTextarea.value = bodyTextarea.value.slice(0,start) + emoji + bodyTextarea.value.slice(end);
        bodyTextarea.selectionStart = bodyTextarea.selectionEnd = start + emoji.length;
        bodyTextarea.focus();
        emojiPicker.classList.remove('show');
    }
    document.querySelectorAll('.emoji-item').forEach(el => el.addEventListener('click', () => insertEmoji(el.textContent)));
    document.addEventListener('click', e => { if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) emojiPicker.classList.remove('show'); });

    // ----- Авторизация, экспорт, импорт -----
    async function login() {
        const uid = userIdInp.value.trim(), pwd = passInp.value;
        if (!uid || !pwd) { showMsg('Введите ID и пароль', true); return; }
        try {
            const data = await loadCollection(uid, pwd);
            currentUser = uid;
            currentPass = pwd;
            notes = data;
            if (!notes.notes) notes.notes = {};
            if (!notes.nextId) notes.nextId = 1;
            authBadge.textContent = `🔓 Активно: ${uid}`;
            const ids = Object.keys(notes.notes);
            currentId = ids.length ? ids[0] : null;
            if (currentId) loadNoteToEditor(currentId);
            else { titleInp.value = ''; bodyTextarea.value = ''; viewerDiv.innerHTML = ''; }
            renderList();
            showMsg(`✅ Доступ открыт. Заметок: ${ids.length}`);
        } catch(e) {
            showMsg(`❌ Ошибка: ${e.message}`, true);
            currentUser = null; currentPass = null;
            authBadge.textContent = '🔒 Не авторизован';
            renderList();
        }
    }
    function logout() {
        currentUser = null; currentPass = null;
        notes = { notes: {}, nextId: 1 };
        currentId = null;
        userIdInp.value = ''; passInp.value = '';
        titleInp.value = ''; bodyTextarea.value = ''; viewerDiv.innerHTML = '';
        authBadge.textContent = '🔒 Не авторизован';
        renderList();
        showMsg('🔓 Вы вышли');
    }
    async function exportBackup() {
        if (!currentUser) { showMsg('Авторизуйтесь', true); return; }
        try {
            const data = await loadCollection(currentUser, currentPass);
            const backup = { version: 'vc_notes_v4', userId: currentUser, encryptedData: await encryptData(data, currentPass), exportedAt: Date.now() };
            const blob = new Blob([JSON.stringify(backup)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `vc_notes_${currentUser}.backup.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            showMsg('✅ Бэкап создан и зашифрован');
        } catch(e) { showMsg(`❌ Ошибка: ${e.message}`, true); }
    }
    async function importBackup(file) {
        if (!file) return;
        if (!currentUser) { showMsg('Авторизуйтесь', true); return; }
        try {
            const text = await file.text();
            const imported = JSON.parse(text);
            if (imported.version !== 'vc_notes_v4' || imported.userId !== currentUser) throw new Error('Неверный формат или ID');
            const decrypted = await decryptData(imported.encryptedData, currentPass);
            notes = decrypted;
            if (!notes.notes) notes.notes = {};
            if (!notes.nextId) notes.nextId = 1;
            await saveCollection(currentUser, currentPass, notes);
            const ids = Object.keys(notes.notes);
            currentId = ids.length ? ids[0] : null;
            if (currentId) loadNoteToEditor(currentId);
            else { titleInp.value = ''; bodyTextarea.value = ''; viewerDiv.innerHTML = ''; }
            renderList();
            showMsg(`✅ Импорт: ${ids.length} заметок`);
        } catch(e) { showMsg(`❌ Импорт: ${e.message}`, true); }
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // ----- События -----
    loginBtn.onclick = login;
    logoutBtn.onclick = logout;
    exportBtn.onclick = exportBackup;
    importBtn.onclick = () => { const inp = document.createElement('input'); inp.type='file'; inp.accept='.json'; inp.onchange=e=>importBackup(e.target.files[0]); inp.click(); };
    newNoteBtn.onclick = newNote;
    saveBtn.onclick = saveCurrent;
    deleteBtn.onclick = deleteCurrent;
    emojiBtn.onclick = showPicker;
    
    bodyTextarea.style.display = 'block';
    viewerDiv.style.display = 'none';
    isViewMode = false;
    modeBtn.textContent = '✏️ Режим редактирования';
    renderList();
</script>
</body>
</html>
